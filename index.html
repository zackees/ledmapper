<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastLED Video Mapper</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="sidebar">
        <h1>FastLED Video Mapper</h1>
        <ul class="tool-list">
            <li><a href="shapemaker/index.html">🔷 Shape Maker</a></li>
            <li><a href="shapeviewer/index.html">👁️ Shape Viewer</a></li>
            <li><a href="moviemaker/index.html">🎬 Movie Maker</a></li>
            <li><a href="movieplayer/index.html">▶️ Movie Player</a></li>
        </ul>
    </div>
    <div class="main-content">
        <iframe id="tool-frame" src="shapemaker/index.html" name="tool-frame"></iframe>
    </div>
    <script>
        document.querySelectorAll('.tool-list a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('tool-frame').src = this.href;
                document.querySelectorAll('.tool-list li').forEach(item => item.classList.remove('selected'));
                this.parentElement.classList.add('selected');
            });
        });

        // Highlight the Shape Maker link on page load
        window.addEventListener('load', function() {
            document.querySelector('.tool-list a[href="shapemaker/index.html"]').parentElement.classList.add('selected');
        });
    </script>
</body>
</html>
