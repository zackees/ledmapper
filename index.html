<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Led Mappper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: #fff;
            padding: 20px;
            height: 100vh;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        h1 {
            color: #ecf0f1;
            text-align: center;
            margin-bottom: 30px;
        }
        .tool-list {
            list-style-type: none;
            padding: 0;
        }
        .tool-list li {
            background-color: #34495e;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .tool-list li:hover {
            background-color: #2980b9;
        }
        .tool-list a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            display: block;
        }
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>🛠️ Awesome Tools</h1>
        <ul class="tool-list">
            <li><a href="shapemaker/index.html">🔷 Shape Maker</a></li>
            <li><a href="shapeviewer/index.html">👁️ Shape Viewer</a></li>
            <li><a href="moviemaker/index.html">🎬 Movie Maker</a></li>
            <li><a href="movieplayer/index.html">▶️ Movie Player</a></li>
        </ul>
    </div>
    <div class="main-content">
        <iframe id="tool-frame" src="about:blank" name="tool-frame"></iframe>
    </div>
    <script>
        document.querySelectorAll('.tool-list a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('tool-frame').src = this.href;
            });
        });
    </script>
</body>
</html>
