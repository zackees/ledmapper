<html>

<head>
	<link rel="stylesheet" href="index.css">
	<style>
		body, html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		#captureContainer {
			position: fixed;
			top: 10px;
			right: 10px;
			z-index: 1000;
			width: 320px;
			height: 240px;
			overflow: hidden;
			transition: opacity 0.3s ease;
		}
		#captureContainer video {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		main {
			width: 100vw;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}
		canvas {
			max-width: 100%;
			max-height: 100%;
			object-fit: contain;
		}
		#popup {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			padding: 20px;
			border-radius: 10px;
			display: none;
			opacity: 0;
			transition: opacity 0.5s ease-in-out;
		}
	</style>
</head>

<body>
	<div id="popup">Click the picture to start drawing your LEDs</div>
	<div id="controls">
		<p>Click: add point. Shift+click: remove. Done: Download</p>
		<p id="print"></p>
		<div>
			<label for="txt_rotate">Rotate:</label>
			<input id="txt_rotate" type="number" value="0" min="-180" max="180" step="0.1" style="width:40px;">
			<input id="slider_rotate" type="range" min="-180" max="180" value="0" step="0.1" style="width:100px;">
		</div>
		<div>
			<label for="txt_zoom">Zoom:</label>
			<input id="txt_zoom" type="number" value="1" min="1" max="5" step="0.01" style="width:50px;">
			<input id="slider_zoom" type="range" min="1" max="5" value="1" step="0.01" style="width:100px;">
		</div>
		<div style="display: flex; gap: 2px; flex-wrap: wrap;">
			<input type="button" id="btn_snapshot" value="Take Snapshot 📷">
			<input type="button" id="btn_delete_last" value="Undo">
			<input type="button" id="btn_clear" value="Clear">
			<input type="button" id="btn_download" value="Download">
		</div>
	</div>

	<!-- Target of the p5.js drawing-->
	<main></main>

	<div id="captureContainer"></div>

</body>

<script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
<script src="/common.js"></script>
<script src="sketch.js"></script>

</html>
