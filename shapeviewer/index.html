<html>

<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>

	<style>
		div.sticky {
			position: -webkit - sticky; /* Safari */
			position: sticky;
			top: 0;
			background-color: white;
			border-style: solid;
			width: 100%;
		}
	</style>
	<link rel="stylesheet" href="index.css">
</head>

<body>
	<div class="sticky">
		<p>Paste the shape into the text field below and click submit.</p>
		<label for="btn_upload_shape">Upload Shape (*.json):</label>
		<input type="file" id="btn_upload_shape" accept=".json"></input><br>
		<label for="txt_zoom">Zoom:</label>
		<input id="txt_zoom" type="text" value="1"></input><br>
	</div>
	<!-- Target of the p5.js drawing-->
	<main></main>

</body>

<script src="/common.js"></script>
<script src="sketch.js"></script>

</html>
