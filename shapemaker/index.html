<html>

<head>
	<style>
		body, html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		#captureContainer {
			position: fixed;
			top: 10px;
			right: 10px;
			z-index: 1000;
			width: 320px;
			height: 240px;
			overflow: hidden;
		}
		#captureContainer video {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		main {
			width: 100vw;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}
		canvas {
			max-width: 100%;
			max-height: 100%;
			object-fit: contain;
		}
	</style>
</head>

<body>
	<p>Click to add a point. shift+click to remove it. When you are done, click "Download Shape"</p>
	<p id="print"></p>

	<input type="button" id="btn_snapshot" value="Take Picture from Camera"></input>
	<br>
	<label for="txt_rotate">Rotate:</label>
	<input id="txt_rotate" type="text" value="0"></input><br>
	<label for="txt_zoom">Zoom:</label>
	<input id="txt_zoom" type="text" value="1"></input><br>

	
	<br>
	<input type="button" id="btn_delete_last" value="Undo Last Point"></input>
	<input type="button" id="btn_clear" value="Clear all points"></input>
	<br>
	<input type="button" id="btn_download" value="Download Shape"></input>

	<!-- Target of the p5.js drawing-->
	<main></main>

	<div id="captureContainer"></div>

</body>

<script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
<script src="/common.js"></script>
<script src="sketch.js"></script>

</html>
