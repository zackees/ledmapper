<div class="sticky top-0 bg-[rgba(17,17,17,0.9)] backdrop-blur-[12px] border-b border-lm-border px-4 py-2.5 z-[1000]">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="mb-0">Screenmap Editor</h1>
            <p class="text-sm text-lm-text-muted mt-0.5 mb-0">changes here will modify the data when saved</p>
        </div>
    </div>
    <div id="controls" class="flex flex-col gap-2">
        <div class="flex flex-wrap items-center gap-3">
            <div class="flex items-center gap-2">
                <label for="sel_preset">Preset:</label>
                <select id="sel_preset">
                    <option value="">Loading presets...</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <label for="btn_upload_screenmap">Upload Screenmap (*.json):</label>
                <input type="file" id="btn_upload_screenmap" accept=".json">
            </div>
            <div class="flex items-center gap-2">
                <label for="btn_upload_image">Background:</label>
                <input type="file" id="btn_upload_image" accept="image/*">
                <button id="btn_remove_image" class="py-0.5 px-2 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-xs disabled:opacity-40 disabled:cursor-not-allowed" disabled title="Remove background image">&times;</button>
            </div>
        </div>
        <details class="accordion" open>
            <summary class="cursor-pointer select-none text-sm font-medium text-lm-text py-1">Screenmap</summary>
            <div class="transform-row flex flex-wrap items-center gap-x-3 gap-y-1 pt-2">
                <label>Scale <input id="txt_scale" type="number" value="1.00" min="0.10" max="10.00" step="0.01"></label>
                <label>X <input id="txt_scale_x" type="number" value="1.00" min="-10.00" max="10.00" step="0.01"></label>
                <label>Y <input id="txt_scale_y" type="number" value="1.00" min="-10.00" max="10.00" step="0.01"></label>
                <label>Rotate <input id="txt_rotate" type="number" value="0" min="-180" max="180" step="1"><span class="unit">°</span></label>
                <label>Move X <input id="txt_translate_x" type="number" value="0" step="1"><span class="unit">px</span></label>
                <label>Move Y <input id="txt_translate_y" type="number" value="0" step="1"><span class="unit">px</span></label>
                <label>LED ⌀ <input id="txt_diameter" type="number" value="0.50" min="0.01" max="100" step="0.01"></label>
            </div>
        </details>
        <details id="bg_image_accordion" class="accordion">
            <summary class="cursor-pointer select-none text-sm font-medium text-lm-text py-1">Image</summary>
            <div class="transform-row flex flex-wrap items-center gap-x-3 gap-y-1 pt-2">
                <label>Opacity <input id="txt_image_opacity" type="number" value="50" min="0" max="100" step="1" disabled><span class="unit">%</span></label>
                <label>Scale <input id="txt_image_scale" type="number" value="1.00" min="0.10" max="5.00" step="0.01" disabled></label>
                <label>Rotate <input id="txt_image_rotate" type="number" value="0.00" min="-180" max="180" step="0.01" disabled><span class="unit">°</span></label>
                <label>Move X <input id="txt_image_tx" type="number" value="0" step="1" disabled><span class="unit">px</span></label>
                <label>Move Y <input id="txt_image_ty" type="number" value="0" step="1" disabled><span class="unit">px</span></label>
            </div>
        </details>
        <div class="flex items-center gap-2">
            <button id="btn_undo" class="py-1 px-3.5 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled title="Undo (Ctrl+Z)">Undo</button>
            <button id="btn_redo" class="py-1 px-3.5 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled title="Redo (Ctrl+Shift+Z)">Redo</button>
            <button id="btn_reset" class="py-1 px-3.5 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled>Reset</button>
            <button id="btn_save_as" class="btn-save py-1 px-3.5 bg-lm-accent text-white border-none rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled>Save As…</button>
        </div>
    </div>
</div>
<main id="main">
    <!-- Canvas target -->
</main>
