<div class="sticky top-0 bg-[rgba(17,17,17,0.9)] backdrop-blur-[12px] border-b border-lm-border px-4 py-2.5 z-[1000]">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="mb-0">ScreenMap Design</h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn_undo" class="py-1 px-3.5 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled title="Undo (Ctrl+Z)">Undo</button>
            <button id="btn_redo" class="py-1 px-3.5 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled title="Redo (Ctrl+Shift+Z)">Redo</button>
            <button id="btn_reset" class="py-1 px-3.5 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled>Reset</button>
            <button id="btn_save_as" class="btn-save py-1 px-3.5 bg-lm-accent text-white border-none rounded cursor-pointer text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled>Save As…</button>
        </div>
    </div>
    <div id="controls" class="flex flex-col gap-2">
        <div class="file-ops-row flex flex-wrap items-center gap-3">
            <button id="btn_new" class="py-1.5 px-4 bg-lm-surface-1 text-lm-text border border-lm-border rounded-lm cursor-pointer text-sm font-medium" title="Create empty screenmap">New</button>
            <div id="screenmap_drop_target" class="drop-zone flex items-center gap-2 py-1.5 px-3 bg-lm-surface-1 border border-lm-border rounded-lm">
                <span class="text-xs font-medium text-lm-text-muted uppercase tracking-wide">Load</span>
                <select id="sel_preset" class="text-sm">
                    <option value="">Loading presets...</option>
                </select>
                <input type="file" id="btn_upload_screenmap" accept=".json" class="text-sm">
            </div>
            <div id="image_drop_target" class="drop-zone flex items-center gap-2 py-1.5 px-3 bg-lm-surface-1 border border-lm-border rounded-lm">
                <span class="text-xs font-medium text-lm-text-muted uppercase tracking-wide">Image</span>
                <input type="file" id="btn_upload_image" accept="image/*" class="text-sm">
                <button id="btn_remove_image" class="py-0.5 px-2 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-xs disabled:opacity-40 disabled:cursor-not-allowed" disabled title="Remove background image">&times;</button>
            </div>
        </div>
    </div>
</div>
<main id="main">
    <!-- Canvas target -->
    <div id="hint_strip" class="hint-strip" role="status" aria-live="polite">
        <span id="hint_strip_text" class="hint-strip-text"></span>
        <button id="hint_strip_help" type="button" class="hint-strip-help" title="Keyboard help (?, F1)">? Help</button>
    </div>
    <div id="transform-overlay" class="transform-overlay">
        <details class="accordion" open>
            <summary class="cursor-pointer select-none text-sm font-medium text-lm-text py-1">Screenmap</summary>
            <div class="transform-row flex flex-wrap items-center gap-x-3 gap-y-1 pt-2">
                <label>Scale <input id="txt_scale" type="number" value="1.00" min="0.10" max="10.00" step="0.01"></label>
                <label>X <input id="txt_scale_x" type="number" value="1.00" min="-10.00" max="10.00" step="0.01"></label>
                <label>Y <input id="txt_scale_y" type="number" value="1.00" min="-10.00" max="10.00" step="0.01"></label>
                <label>Rotate <input id="txt_rotate" type="number" value="0" min="-180" max="180" step="1"><span class="unit">°</span></label>
                <label>Move X <input id="txt_translate_x" type="number" value="0" step="1"><span class="unit">px</span></label>
                <label>Move Y <input id="txt_translate_y" type="number" value="0" step="1"><span class="unit">px</span></label>
                <label>LED ⌀ <input id="txt_diameter" type="number" value="0.50" min="0.01" max="100" step="0.01"></label>
            </div>
        </details>
        <details id="panel_palette" class="accordion">
            <summary class="cursor-pointer select-none text-sm font-medium text-lm-text py-1">Add Panel</summary>
            <div class="pt-2 flex flex-col gap-2">
                <div id="panel_catalog_buttons" class="flex flex-wrap gap-1"></div>
                <div class="transform-row flex flex-wrap items-center gap-x-3 gap-y-1">
                    <label>Wiring
                        <select id="pp_wiring" class="text-sm">
                            <option value="serpentine">Serpentine</option>
                            <option value="progressive">Progressive</option>
                        </select>
                    </label>
                    <label>Data In
                        <select id="pp_corner" class="text-sm">
                            <option value="TL">TL</option>
                            <option value="TR">TR</option>
                            <option value="BL">BL</option>
                            <option value="BR">BR</option>
                        </select>
                    </label>
                    <label>Rotate
                        <select id="pp_rotation" class="text-sm">
                            <option value="0">0°</option>
                            <option value="90">90°</option>
                            <option value="180">180°</option>
                            <option value="270">270°</option>
                        </select>
                    </label>
                    <label>Flip H <input id="pp_flipH" type="checkbox"></label>
                    <label>Flip V <input id="pp_flipV" type="checkbox"></label>
                    <label>Spacing <input id="pp_spacing" type="number" value="1" min="0.01" step="0.1"></label>
                    <label>Snap <input id="pp_snap" type="checkbox" checked></label>
                    <label>Grid <input id="pp_grid" type="number" value="1" min="0.01" step="0.1"></label>
                </div>
                <div id="pp_status" class="text-xs text-lm-text-muted"></div>
            </div>
        </details>
        <details id="strips_panel" class="accordion">
            <summary class="cursor-pointer select-none text-sm font-medium text-lm-text py-1">Strips</summary>
            <div class="pt-2 flex flex-col gap-2">
                <label class="flex items-center gap-1 text-xs text-lm-text-muted">
                    <input id="strips_show_chain" type="checkbox" checked>
                    Show chain
                </label>
                <div id="strips_list" class="flex flex-col gap-1 max-h-64 overflow-y-auto"></div>
                <div id="strips_backup_row" class="flex items-center justify-between gap-2 mt-2 pt-2 border-t border-lm-border text-xs text-lm-text-muted" style="display:none;">
                    <span id="strips_backup_summary">No backup</span>
                    <button id="strips_btn_restore_backup" type="button" class="py-1 px-2 bg-lm-surface-1 text-lm-text border border-lm-border rounded cursor-pointer text-xs disabled:opacity-40 disabled:cursor-not-allowed">Restore backup…</button>
                </div>
            </div>
        </details>
        <details id="bg_image_accordion" class="accordion">
            <summary class="cursor-pointer select-none text-sm font-medium text-lm-text py-1">Image</summary>
            <div class="transform-row flex flex-wrap items-center gap-x-3 gap-y-1 pt-2">
                <label>Opacity <input id="txt_image_opacity" type="number" value="50" min="0" max="100" step="1" disabled><span class="unit">%</span></label>
                <label>Scale <input id="txt_image_scale" type="number" value="1.00" min="0.10" max="5.00" step="0.01" disabled></label>
                <label>Rotate <input id="txt_image_rotate" type="number" value="0.00" min="-180" max="180" step="0.01" disabled><span class="unit">°</span></label>
                <label>Move X <input id="txt_image_tx" type="number" value="0" step="1" disabled><span class="unit">px</span></label>
                <label>Move Y <input id="txt_image_ty" type="number" value="0" step="1" disabled><span class="unit">px</span></label>
            </div>
        </details>
    </div>
</main>
