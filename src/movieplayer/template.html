<div class="controls">
    <h1>Video Player</h1>
    <p>Drop a <code>.fled</code> video recorded by the Mapped Video Maker — the screenmap travels inside the file.</p>
    <div class="controls-container control-bar-start mt-2">
        <!-- Uploads -->
        <div class="control-stack-start">
            <div class="screenmap-status" id="screenmap_status" aria-live="polite">No video loaded</div>
            <div class="upload-row" id="movie_drop_target">
                <label for="btn_load_movie">Upload Video (*.fled):</label>
                <input type="file" id="btn_load_movie" accept=".fled">
            </div>
        </div>

        <!-- Playback + diameter -->
        <div class="control-stack">
            <div class="button-row">
                <input type="button" id="btn_play" value="Play">
                <input type="button" id="btn_record" value="Record">
            </div>
            <div class="control-row">
                <label for="rng_diameter">LED Diameter:</label>
                <input type="range" min="1" max="20" value="6" step="1" class="slider" id="rng_diameter">
                <span class="slider-readout" id="txt_curr_diameter">6</span>
            </div>
        </div>

        <!-- Bloom -->
        <div class="control-stack-start">
            <label class="checkbox-row">
                <input type="checkbox" id="chk_auto_bloom" checked> Auto bloom
            </label>
            <div id="bloom_strength_slider" class="control-row is-disabled">
                <label for="rng_bloom_strength" class="text-sm text-lm-text-muted">Strength</label>
                <input type="range" min="0" max="100" value="50" class="slider" id="rng_bloom_strength" disabled>
                <span class="slider-readout-wide" id="txt_curr_bloom_strength">16.00</span>
            </div>
        </div>
    </div>
</div>
<main>
    <!-- Canvas target -->
</main>
