<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenmap Viewer</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/nav.css">
    <link rel="stylesheet" href="shapeviewer.css">
</head>
<body>
    <div class="sticky">
        <h1>Screenmap Viewer</h1>
        <div id="controls">
            <div>
                <label for="btn_upload_shape">Upload Screenmap (*.json):</label>
                <input type="file" id="btn_upload_shape" accept=".json">
            </div>
            <div>
                <label for="txt_zoom">Zoom:</label>
                <input id="txt_zoom" type="number" value="1" min="0.1" max="10" step="0.1">
                <input id="slider_zoom" type="range" min="0.1" max="10" value="1" step="0.1">
            </div>
        </div>
    </div>
    <main id="main">
        <!-- Canvas target -->
    </main>
    <script type="module" src="sketch.js"></script>
</body>
</html>
