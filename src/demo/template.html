<div class="controls">
    <!-- Hidden file inputs -->
    <div style="display: none;">
        <input type="file" id="btn_upload_screenmap" accept=".json">
        <input type="file" id="btn_load_movie" accept=".fled">
    </div>

    <!-- Compact controls, inlaid over the canvas as two stacked rows. The
         verbose Demo title + description + the three Download buttons live
         inside a kebab "More…" details pop-over so the resting height stays
         small. -->
    <div class="controls-container control-bar demo-controls-row">
        <input type="button" id="btn_play" value="Play">

        <div class="control-row">
            <label for="sel_framerate">FPS</label>
            <select id="sel_framerate">
                <option value="native" selected>Native</option>
                <option value="60">60</option>
                <option value="30">30</option>
                <option value="15">15</option>
                <option value="10">10</option>
                <option value="5">5</option>
                <option value="3">3</option>
                <option value="1">1</option>
            </select>
        </div>

        <div class="control-row">
            <label for="rng_diameter">LED size</label>
            <input type="range" min="1" max="64" value="6" step="1" class="slider" id="rng_diameter">
            <span class="slider-readout" id="txt_curr_diameter">6</span>
        </div>
    </div>

    <div class="controls-container control-bar demo-controls-row">
        <label class="checkbox-row">
            <input type="checkbox" id="chk_auto_bloom" checked> Auto bloom
        </label>

        <div id="bloom_strength_slider" class="control-row is-disabled">
            <label for="rng_bloom_strength" class="text-sm text-lm-text-muted">Strength</label>
            <input type="range" min="0" max="100" value="50" class="slider" id="rng_bloom_strength" disabled>
            <span class="slider-readout-wide" id="txt_curr_bloom_strength">16.00</span>
        </div>

        <details class="demo-more">
            <summary>More…</summary>
            <div class="demo-more-body">
                <p class="text-xs text-lm-text-muted">4x serpentine matrix demo · see <a href="https://zackees.github.io/fastled-wasm/FxSdCard">FxSdCard in FastLED</a></p>
                <div class="button-row mt-2">
                    <button id="btn_download_screenmap">Download Screenmap</button>
                    <button id="btn_download_screenmap_16x16_serpentine">Download 16×16 Serpentine</button>
                    <button id="btn_download_video">Download Mapped Video</button>
                </div>
            </div>
        </details>
    </div>
</div>
<main class="drop-zone">
    <!-- Three.js canvas injected here by sketch.js -->
</main>
