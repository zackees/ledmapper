<div class="app-layout flex flex-col flex-1 min-h-0 overflow-hidden">
    <aside id="sidebar">
        <div class="sidebar-scroll">
            <div id="hidden-video-controls" style="display:none">
                <button id="btn_load_video" type="button"></button>
                <button id="btn_start_webcam" type="button"></button>
                <select id="sel_resolution">
                    <option value="640x480">640x480</option>
                    <option value="1280x720">1280x720</option>
                    <option value="1080x1920">1080x1920 (Portrait)</option>
                </select>
                <select id="sel_framerate">
                    <option value="30">30 FPS</option>
                    <option value="60">60 FPS</option>
                </select>
            </div>

            <details class="panel" open>
                <summary>Screenmap</summary>
                <div class="panel-body">
                    <div class="control-group">
                        <p id="screenmap_gate_hint" class="field-label">Load a video source to choose a layout.</p>
                        <span class="field-label">Presets</span>
                        <!-- Buttons are generated from public/screenmaps/manifest.json
                             (baked into the bundle via virtual:screenmap-presets) -->
                        <div class="button-row preset-buttons"></div>
                        <div id="screenmap_drop_target" class="drop-zone">
                            <label class="field-label" for="btn_upload_screenmap">Upload custom</label>
                            <input type="file" id="btn_upload_screenmap" accept=".csv,.json">
                        </div>
                    </div>
                </div>
            </details>

        </div>
    </aside>

    <div class="canvas-row">
        <aside id="canvas-controls">
            <details class="panel" open>
                <summary>Blur</summary>
                <div class="panel-body">
                    <div class="control-group">
                        <div class="slider-container">
                            <label for="rng_blur">Radius</label>
                            <input type="range" min="0" max="100" value="3" class="slider" id="rng_blur">
                            <span id="txt_curr_blur">3</span>
                        </div>
                        <div class="slider-container">
                            <label for="rng_blur_sigma">Sigma</label>
                            <input type="range" min="0" max="100" value="3" class="slider" id="rng_blur_sigma">
                            <span id="txt_curr_blur_sigma">3</span>
                            <label class="checkbox-inline"><input type="checkbox" id="chk_sigma_lock" checked> Lock Sigma to Radius</label>
                        </div>
                    </div>
                </div>
            </details>

            <details class="panel" open>
                <summary>Camera Position</summary>
                <div class="panel-body">
                    <div class="control-group">
                        <div class="slider-container">
                            <label for="rng_rotation">Rotation</label>
                            <input type="range" min="-180" max="180" value="0" class="slider" id="rng_rotation">
                            <span id="txt_curr_rotation">0</span>
                        </div>
                        <div class="slider-container">
                            <label for="rng_zoom">Zoom</label>
                            <input type="range" min="0.15" max="3" value="1" step="0.01" class="slider" id="rng_zoom">
                            <span id="txt_curr_zoom">1</span>
                        </div>
                    </div>
                </div>
            </details>

            <details class="panel" open>
                <summary>Pixel Effects</summary>
                <div class="panel-body">
                    <div class="control-group">
                        <div class="slider-container">
                            <label for="rng_brightness">Brightness Scale</label>
                            <input type="range" min="0" max="100" value="100" class="slider" id="rng_brightness">
                            <span id="txt_curr_bri">100%</span>
                        </div>
                        <div class="slider-container">
                            <label for="rng_gamma">Gamma</label>
                            <input type="range" min="1" max="100" value="10" class="slider" id="rng_gamma">
                            <span id="txt_curr_gamma">1.0</span>
                        </div>
                        <label class="checkbox-inline"><input type="checkbox" id="chk_limit_brightness"> Limit Max Brightness</label>
                        <div class="slider-container disabled" id="max_bri_slider">
                            <label for="rng_max_brightness">Max Brightness</label>
                            <input type="range" min="1" max="100" value="50" class="slider" id="rng_max_brightness" disabled>
                            <span id="txt_curr_max_bri">50%</span>
                        </div>
                    </div>
                </div>
            </details>

            <details class="panel" open>
                <summary>Bloom</summary>
                <div class="panel-body">
                    <div class="control-group">
                        <label class="checkbox-inline"><input type="checkbox" id="chk_auto_bloom" checked> Auto bloom</label>
                        <div class="slider-container disabled" id="bloom_strength_slider">
                            <label for="rng_bloom_strength">Strength</label>
                            <input type="range" min="0" max="100" value="50" class="slider" id="rng_bloom_strength" disabled>
                            <span id="txt_curr_bloom_strength">0.60</span>
                        </div>
                    </div>
                </div>
            </details>
        </aside>

        <main class="canvas-area drop-zone flex-1 flex justify-center items-center p-6 relative min-w-0 bg-lm-bg">
            <div id="welcome-overlay">
                <div class="welcome-content">
                    <h2 class="welcome-title">Video Maker</h2>
                    <p class="welcome-sub">Choose a video source to start mapping LEDs</p>
                    <div class="flex gap-4 justify-center mb-5">
                        <button type="button" class="source-card" data-trigger="btn_load_video">
                            <div class="text-5xl leading-none">&#9654;</div>
                            <span class="text-lg font-medium text-lm-text">Load Video</span>
                            <span class="text-sm text-lm-text-muted">Upload a video file from your device</span>
                        </button>
                        <button type="button" class="source-card" data-trigger="btn_start_webcam">
                            <div class="text-5xl leading-none">&#127909;</div>
                            <span class="text-lg font-medium text-lm-text">Use Webcam</span>
                            <span class="text-sm text-lm-text-muted">Capture live from your camera</span>
                        </button>
                    </div>
                    <div class="welcome-status">
                        <span class="status-dot"></span>
                        16x16 grid preset ready
                    </div>
                    <p class="welcome-hint">Change LED layout or adjust effects in the toolbar</p>
                </div>
            </div>
            <div id="canvas-container" class="flex flex-col items-center gap-1.5">
                <div class="canvas-toolbar">
                    <input type="button" id="btn_toggle_record" value="Start Recording" disabled>
                    <select id="sel_record_format" class="toolbar-select" title="Recording output format">
                        <option value="fled" selected>.fled (LED data)</option>
                        <option value="mp4">.mp4 (social)</option>
                        <option value="both">Both</option>
                    </select>
                    <select id="sel_record_aspect" class="toolbar-select" title="MP4 aspect ratio" disabled>
                        <option value="square" selected>1:1 (square)</option>
                        <option value="portrait">9:16 (Reels / Shorts)</option>
                        <option value="landscape">16:9 (YouTube)</option>
                    </select>
                    <div class="toolbar-separator"></div>
                    <select id="sel_max_resolution" class="toolbar-select" title="Max canvas resolution">
                        <option value="0">Native</option>
                        <option value="960">960p</option>
                        <option value="720">720p</option>
                        <option value="480" selected>480p</option>
                        <option value="360">360p</option>
                        <option value="240">240p</option>
                    </select>
                    <span id="txt_curr_resolution" class="toolbar-resolution-label"></span>
                    <div class="toolbar-separator"></div>
                    <label class="toolbar-checkbox"><input type="checkbox" id="chk_show_leds" checked> Show LEDs</label>
                    <div class="toolbar-separator"></div>
                    <button id="btn_unload_source" type="button" class="btn-unload" title="Unload source">&#10005;</button>
                </div>
                <div id="video-progress" class="video-progress-bar">
                    <button id="btn_play_pause" type="button" class="btn-play-pause" title="Play">&#9654;</button>
                    <span id="video-time-current" class="video-time">0:00</span>
                    <div id="video-progress-track" class="progress-track">
                        <div id="video-progress-fill" class="progress-fill"></div>
                        <div id="video-progress-thumb" class="progress-thumb"></div>
                    </div>
                    <span id="video-time-duration" class="video-time">0:00</span>
                </div>
                <div class="canvas-with-preview flex gap-3 items-start">
                    <div class="canvas-wrapper relative leading-none">
                        <canvas id="renderCanvas"></canvas>
                        <canvas id="overlayCanvas"></canvas>
                    </div>
                    <div class="preview-column flex flex-col gap-2">
                        <div id="previewPanel"></div>
                        <div id="preview-options" class="preview-options">
                            <label class="checkbox-inline"><input type="checkbox" id="chk_preview_rotate"> Rotate view</label>
                            <label class="checkbox-inline"><input type="checkbox" id="chk_preview_bloom" checked> Bloom</label>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<button id="btn_how_to" type="button" class="help-fab" title="Help &amp; tips">?</button>
<video id="videoPlayer" style="display:none" loop muted></video>
