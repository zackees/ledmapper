<!-- Source selection screen -->
<div id="sourceSelect" class="flex-1 flex justify-center items-center p-6">
    <div class="source-select-inner text-center max-w-[480px]">
        <h2>Screenmap Maker</h2>
        <p>Choose how to capture your LED layout</p>
        <div class="flex gap-4 justify-center mb-5">
            <button id="btn_webcam" class="source-card">
                <div class="text-5xl leading-none">&#127909;</div>
                <span class="text-lg font-medium text-lm-text">Video Capture</span>
                <span class="text-sm text-lm-text-muted">Use your webcam to take a snapshot</span>
            </button>
            <button id="btn_upload" class="source-card">
                <div class="text-5xl leading-none">&#128444;</div>
                <span class="text-lg font-medium text-lm-text">Upload Image</span>
                <span class="text-sm text-lm-text-muted">Load a picture (or drag &amp; drop)</span>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </button>
        </div>
    </div>
</div>

<!-- Mapping UI (hidden until source is chosen) -->
<div id="mappingUI" hidden>
    <div id="popup">Click the picture to start drawing your LEDs</div>
    <div id="controls">
        <p class="controls-hint">Click the image to drop an LED at each position, <strong>in wiring order</strong>. Shift-click removes one. Hit <strong>Download</strong> when you're finished.</p>
        <p id="print"></p>
        <div>
            <label for="txt_rotate">Rotate:</label>
            <input id="txt_rotate" type="number" value="0" min="-180" max="180" step="0.1">
            <input id="slider_rotate" type="range" min="-180" max="180" value="0" step="0.1">
        </div>
        <div>
            <label for="txt_zoom">Zoom:</label>
            <input id="txt_zoom" type="number" value="1" min="1" max="5" step="0.01">
            <input id="slider_zoom" type="range" min="1" max="5" value="1" step="0.01">
        </div>
        <div class="flex gap-1 flex-wrap">
            <input type="button" id="btn_snapshot" value="Take Snapshot">
            <input type="button" id="btn_delete_last" value="Undo">
            <input type="button" id="btn_clear" value="Clear">
            <input type="button" id="btn_download" value="Download">
        </div>
        <div class="flex gap-1 flex-wrap items-center">
            <label for="sel_strip">Strip:</label>
            <select id="sel_strip"><option value="strip1">strip1</option></select>
            <input type="button" id="btn_add_strip" value="+ Strip">
            <input type="button" id="btn_rename_strip" value="Rename" title="Rename the selected strip">
            <input type="button" id="btn_delete_strip" value="&times; Strip">
        </div>
    </div>

    <!-- Canvas target -->
    <main></main>

    <div id="captureContainer"></div>
</div>
