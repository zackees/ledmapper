<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapped Video Maker</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
</head>
<body>
    <div id="menu">
        <div class="top-row">
            <div class="left-section">
                <div class="control-group">
                    <label for="btn_upload_shape">Upload Screenmap.json (*.json):</label>
                    <input type="file" id="btn_upload_shape" accept=".csv,.json">
                </div>
                <div class="control-group">
                    <label for="sel_resolution">Capture Resolution:</label>
                    <select id="sel_resolution">
                        <option value="640x480">640x480</option>
                        <option value="1280x720">1280x720</option>
                        <option value="1080x1920">1080x1920 (Portrait)</option>
                    </select>
                </div>
            </div>
            <div class="right-section">
                <button id="btn_how_to">👉 Readme</button>
            </div>
        </div>
        <p>Create movies for your LED shapes.</p>
        <div class="controls">
            <div class="control-group">
                <h2>Movement</h2>
                <ul>
                    <li>Left Click: Move to point</li>
                    <li>Mouse Wheel: Zoom in/out</li>
                    <li>Shift + Mouse Wheel: Rotate</li>
                </ul>
            </div>
            <div class="control-group">
                <div class="slider-container">
                    <label for="rng_rotation">Rotation:</label>
                    <input type="range" min="-180" max="180" value="0" class="slider" id="rng_rotation">
                    <span id="txt_curr_rotation">0</span>
                </div>
                <div class="slider-container">
                    <label for="rng_brightness">Brightness:</label>
                    <input type="range" min="0" max="100" value="100" class="slider" id="rng_brightness">
                    <span id="txt_curr_bri">100%</span>
                </div>
                <div class="slider-container">
                    <label for="rng_gamma">Gamma:</label>
                    <input type="range" min="1" max="100" value="10" class="slider" id="rng_gamma">
                    <span id="txt_curr_gamma">1.0</span>
                </div>
                <div class="slider-container">
                    <label for="rng_blur">Blur:</label>
                    <input type="range" min="1" max="20" value="3" class="slider" id="rng_blur">
                    <span id="txt_curr_blur">3</span>
                </div>
                <div class="slider-container">
                    <label for="rng_blur_sigma">Blur sigma:</label>
                    <input type="range" min="0" max="7" value="1" class="slider" id="rng_blur_sigma">
                    <span id="txt_curr_blur_sigma">1</span>
                </div>
                <div class="slider-container">
                    <label for="rng_zoom">Zoom:</label>
                    <input type="range" min="0.15" max="3" value="1" step="0.01" class="slider" id="rng_zoom">
                    <span id="txt_curr_zoom">1</span>
                </div>
            </div>
            <div class="control-group">
                <label for="chk_show_status">
                    <input type="checkbox" id="chk_show_status" checked>
                    Show status (faster when disabled)
                </label>
            </div>
        </div>
        <div class="bottom-controls">
            <div class="control-group">
                <input type="button" id="btn_toggle_record" value="Start Recording">
            </div>
        </div>
    </div>
    <main>
        <!-- Target of the p5.js drawing -->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/common.js"></script>
    <script src="blurWorkerContext.js"></script>
    <style>
        .custom-popup-class {
            font-family: 'Roboto', sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
        }
        .custom-content-class {
            color: #e0e0e0;
        }
        .custom-popup-class h3 {
            color: #f0ead6; /* Eggshell white */
        }
        .custom-popup-class ul {
            padding-left: 20px;
        }
        .custom-popup-class li {
            margin-bottom: 10px;
        }
    </style>
    <script>
        let shapeValid = false;
    </script>
    <script src="sketch.js"></script>
</body>
</html>
