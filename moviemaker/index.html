<html>

<head>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>

	<style>
		#menu {
			top: 0;
			background-color: white;
			width: 100%;
		}
	</style>

</head>

<body>
	<div id="menu">
		<p>Paste the shape (a csv of x,y values) into the text field below and click submit.</p>
		Movement:
		<ul>
			<li>Left Click: Move to point.</li>
			<li>Mouse Wheel: Zoom in/out</li>
			<li>Shift + Mouse Wheel: Rotate</li>
		</ul>
		<label for="btn_upload_shape">Upload Shape (*.csv):</label>
		<input type="file" id="btn_upload_shape" accept=".csv"></input><br>
		<input type="button" id="btn_start_capture" value="Start Video"></input>
		<input type="button" id="btn_end_capture" value="End Video"></input><br>
		<input type="button" id="btn_start_record" value="Start Recording"></input>
		<input type="button" id="btn_end_record" value="End Recording"></input><br>
		<label for="rng_brightness">Brightness factor:</label>
		<input type="range" min="0" max="100" value="100" class="slider" id="rng_brightness"></input><span id="txt_curr_bri">100%</span><br>
		<label for="rng_gamma">Gamma factor:</label>
		<input type="range" min="1" max="40" value="10" class="slider" id="rng_gamma"></input><span id="txt_curr_gamma">1.0</span>
		<br>
		<!-- guassian blur, first radius then sigma -->
		<label for="rng_blur">Blur factor:</label>
		<input type="range" min="1" max="20" value="3" class="slider" id="rng_blur"></input><span id="txt_curr_blur">3</span><br>
		<label for="rng_blur_sigma">Blur sigma:</label>
		<input type="range" min="0" max="7" value="1" class="slider" id="rng_blur_sigma"></input><span id="txt_curr_blur_sigma">1</span><br>
		<!-- checkbox for showing status, which is computationally heavy -->
		<label for="chk_show_status">Show status:</label>
		<input type="checkbox" id="chk_show_status" checked></input>
		<p>Downloaded binary contains raw stream of pixels represented as uint8_t of r, g, b</p>
	</div>
	<!-- Target of the p5.js drawing-->
	<main></main>

</body>

<script src="/common.js"></script>
<script src="sketch.js"></script>

</html>
