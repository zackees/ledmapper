<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
</head>

<body>
    <div class="controls">
        <h1>Demo</h1>
        <p>See Fastled/examples/FxSdCard/data/ for video.rgb and screenmap.json examples</p>
        
        <!-- Hidden file inputs -->
        <div style="display: none;">
            <input type="file" id="btn_upload_shape" accept=".json">
            <input type="file" id="btn_load_movie" accept=".rgb">
        </div>

        <!-- New flex container for the three sections -->
        <div class="controls-container">
            <!-- Left section - Play/Pause -->
            <div class="control-section">
                <input type="button" id="btn_play" value="Play">
            </div>

            <!-- Middle section - Sliders -->
            <div class="control-section">
                <div class="slider-container">
                    <label for="rng_diameter">LED Diameter:</label>
                    <input type="range" min="1" max="20" value="6" step="1" class="slider" id="rng_diameter">
                    <span id="txt_curr_diameter">6</span>
                </div>
                <div class="slider-container">
                    <label for="sel_framerate">Frame Rate:</label>
                    <select id="sel_framerate">
                        <option value="60">60 FPS</option>
                        <option value="30">30 FPS</option>
                        <option value="15">15 FPS</option>
                        <option value="10">10 FPS</option>
                        <option value="5">5 FPS</option>
                        <option value="3">3 FPS</option>
                        <option value="1">1 FPS</option>
                    </select>
                </div>
                <div class="slider-container">
                    <label for="chk_show_lines">Show Leds:</label>
                    <input type="checkbox" id="chk_show_lines" checked>
                </div>
            </div>

            <!-- Right section - Download buttons -->
            <div class="control-section">
                <div class="button-container">
                    <button id="btn_download_screenmap">Download Screenmap</button>
                    <button id="btn_download_video">Download Video</button>
                </div>
            </div>
        </div>
        <script>

            function init() {
                document.getElementById('rng_diameter').value = 16;
                document.getElementById('rng_diameter').dispatchEvent(new Event('input', {
                    bubbles: true
                }));
            }
            // do the same but on page load
            window.addEventListener('load', () => {
                init();
            });
            // now do the sam
        </script>
    </div>
    <main>
        <!-- Target of the p5.js drawing -->
    </main>

    <script src="/common.js"></script>
    <script src="sketch.js"></script>
</body>

</html>
