<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html, body {
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            text-align: center;
        }
        #container { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            box-sizing: border-box;
        }
        #videoPlayer { display: none; }
        #videoCanvas { 
            border: 2px solid black;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="videoCanvas"></canvas><br>
        <video id="videoPlayer" style="display: none;" loop muted></video>
        <button id="loadButton">Load Video</button>
        <button id="playPauseButton" disabled>Play</button>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
