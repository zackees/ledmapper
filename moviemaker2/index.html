<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html, body {
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #container { 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        #videoPlayer { display: none; }
        #videoCanvas, #copyCanvas { 
            border: 2px solid black;
            width: 100%;
            height: auto;
        }
        .canvas-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls {
            margin-top: 20px;
        }
        button {
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="loadButton">Load Video</button>
        <button id="playPauseButton" disabled>Play</button>
    </div>
    <div id="blurControls">
        <div>
            <label for="blurRadiusSlider">Blur Radius: </label>
            <input type="range" id="blurRadiusSlider" min="0" max="20" value="0" step="1">
            <input type="number" id="blurRadiusValue" min="0" max="20" value="0" step="1" style="width: 50px;">
        </div>
        <div>
            <label for="sigmaSlider">Sigma: </label>
            <input type="range" id="sigmaSlider" min="0.1" max="10" value="1" step="0.1">
            <input type="number" id="sigmaValue" min="0.1" max="10" value="1" step="0.1" style="width: 50px;">
        </div>
    </div>
    <div id="container">
        <div class="canvas-container">
            <canvas id="copyCanvas"></canvas>
            <div>Original Video</div>
        </div>
        <div class="canvas-container">
            <canvas id="videoCanvas"></canvas>
            <div>Blurred Video</div>
        </div>
    </div>



    <video id="videoPlayer" style="display: none;" loop muted></video>
    <script src="../common.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
