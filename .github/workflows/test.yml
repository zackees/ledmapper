name: Integration tests (Playwright)

# On-demand only. The Playwright suite is moving to tests/integration/
# in a follow-up PR; until then it runs from tests/e2e/. Default CI is
# in ci.yml.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npx playwright install chromium --with-deps

      - run: npm run test:integration
