name: Nightly GPU tests (SwiftShader)

# Runs the @gpu-tagged WebGL specs (recording, resolution, drag, fps) that
# are skipped on the default push/PR CI path because headless ubuntu-latest
# Chromium has no real GPU. Headless SwiftShader (CPU-rendered but
# correctness-accurate WebGL, including readPixels) lets these run
# unattended on a schedule instead of rotting silently — see issue #227,
# filed after the #219 preset-recording regression shipped undetected for
# months.
on:
  schedule:
    # ~08:00 UTC nightly.
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  gpu:
    runs-on: ubuntu-latest
    env:
      CI: 1
      GPU_CI: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (when browsers are cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npm run build

      - name: Run @gpu suite under SwiftShader
        # @gpu-perf specs (drag-perf, 64x64-fps) are excluded: their FPS /
        # per-frame-cost assertions are meaningless under CPU rendering, and
        # the 64x64 recording workload is heavy enough to kill the shared
        # browser context on the runner (observed in run 2 as "Target page,
        # context or browser has been closed" cascades). They remain
        # local-run-only.
        run: npx playwright test --grep "@gpu" --grep-invert "@gpu-perf" --retries=1

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-nightly-playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-nightly-test-results
          path: test-results/
          retention-days: 7
