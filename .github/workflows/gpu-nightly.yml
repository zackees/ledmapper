name: Nightly GPU tests (SwiftShader)

# Runs the @gpu-tagged WebGL specs (recording, resolution, drag, fps) that
# are skipped on the default push/PR CI path because headless ubuntu-latest
# Chromium has no real GPU. Headless SwiftShader (CPU-rendered but
# correctness-accurate WebGL, including readPixels) lets these run
# unattended on a schedule instead of rotting silently — see issue #227,
# filed after the #219 preset-recording regression shipped undetected for
# months.
on:
  schedule:
    # ~08:00 UTC nightly.
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  gpu:
    runs-on: ubuntu-latest
    env:
      CI: 1
      GPU_CI: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (when browsers are cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npm run build

      - name: Run @gpu suite under SwiftShader (per-file isolation)
        # @gpu-perf specs (drag-perf, 64x64-fps) are excluded: their FPS /
        # per-frame-cost assertions are meaningless under CPU rendering.
        # @gpu-heavy (the radius-50 blur double-recording) is excluded: it
        # reliably kills the runner's renderer process under SwiftShader.
        # @gpu-flaky quarantines the 3 tests that stayed unstable in run 4
        # (13/16 green) — tracked for deflake + re-enable; a red-by-default
        # nightly would just train everyone to ignore it. All excluded tiers
        # still run locally on real GPUs.
        #
        # Each spec file runs as its own playwright invocation so a
        # renderer-process crash (run 3: "GPU stall due to ReadPixels" →
        # "Target page, context or browser has been closed" cascades) is
        # contained to one file and every file starts with a fresh browser.
        run: |
          status=0
          for spec in moviemaker-recording moviemaker-preset-recording moviemaker-resolution moviemaker-drag-leave; do
            echo "=== $spec ==="
            npx playwright test "tests/integration/$spec.spec.ts" \
              --grep "@gpu" --grep-invert "@gpu-perf|@gpu-heavy|@gpu-flaky" --retries=1 \
              || status=1
          done
          exit $status

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-nightly-playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-nightly-test-results
          path: test-results/
          retention-days: 7
